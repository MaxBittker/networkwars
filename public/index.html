<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Network Wars</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root {
    --red:#ff4d5e; --green:#36d39a; --yellow:#f5c542; --blue:#4d8bff; --purple:#a96bff;
    --teal:#5fd0d6; --ink:#06140f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; background:#04100c; color:#cfe;
    font-family: -apple-system, "SF Pro Display", Segoe UI, Roboto, sans-serif; overflow:hidden; }
  /* phone-shaped column with the real game's bottom-up green glow */
  #app { display:flex; flex-direction:column; height:100%; max-width:440px; margin:0 auto;
    position:relative;
    background:
      radial-gradient(120% 70% at 50% 118%, rgba(40,180,120,.30), transparent 60%),
      radial-gradient(100% 60% at 50% -10%, rgba(40,120,90,.12), transparent 60%),
      #04100c; }

  /* top bar: menu + faction count chips */
  header { display:flex; align-items:center; gap:8px; padding:12px 14px 6px; }
  #menuwrap { position:relative; flex:0 0 auto; }
  #menu { width:30px; height:30px; display:flex; flex-direction:column;
    justify-content:center; gap:5px; cursor:pointer; opacity:.85; padding:3px; }
  #menu span { height:2.5px; background:#bfe; border-radius:2px; }
  #menu:active { opacity:.5; }
  #menupop { position:absolute; top:38px; left:0; z-index:10; min-width:178px;
    background:#04130d; border:1px solid #1c5; border-radius:12px; padding:6px;
    box-shadow:0 10px 34px -10px rgba(0,0,0,.85); display:none; }
  #menupop.show { display:block; }
  #menupop .mi { padding:9px 12px; border-radius:8px; font-size:14px; color:#cfe;
    cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
  #menupop .mi:active { background:rgba(255,255,255,.09); }
  #menupop .mi.sel { color:#bfe; }
  #menupop .mi.sel::after { content:'✓'; color:var(--teal); font-weight:800; }
  #menupop .lbl { padding:9px 12px 4px; font-size:11px; text-transform:uppercase;
    letter-spacing:.05em; color:#6fae9e; }
  #menupop .div { height:1px; background:rgba(255,255,255,.08); margin:5px 6px; }
  #chips { flex:1; display:flex; justify-content:center; gap:12px; }
  .chip { position:relative; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:14px; color:#fff;
    border:2.4px solid currentColor; background:rgba(0,0,0,.55); }
  .chip.red{color:var(--red)} .chip.green{color:var(--green)} .chip.yellow{color:var(--yellow)}
  .chip.blue{color:var(--blue)} .chip.purple{color:var(--purple)}
  .chip { box-shadow:0 0 10px -1px currentColor, inset 0 0 6px -2px currentColor; }
  .chip.cur { box-shadow:0 0 0 2px #fff, 0 0 16px 1px currentColor; }
  .chip.dead { opacity:.28; filter:grayscale(.4); }
  .chip b { color:#fff; }

  #board { flex:1; position:relative; min-height:0; }
  canvas { width:100%; height:100%; display:block; touch-action:none; }

  /* AI suggestions panel */
  #ai { padding:4px 12px 2px; }
  #ai-head { display:flex; align-items:center; justify-content:space-between;
    font-size:12px; letter-spacing:.04em; text-transform:uppercase; margin-bottom:5px; }
  #record { font-weight:700; font-size:12px; color:#8fcfb8; letter-spacing:.02em; }
  #record.off { visibility:hidden; }
  #winpct { font-weight:800; font-size:14px; color:#bfe; }
  /* win-expectation over the game: wide, short, subtle line graph */
  #wingraph { display:block; width:100%; height:34px; margin-bottom:7px; }
  /* fixed height = 8 rows (the server caps top moves at 8) so the board never
     re-layouts when the suggestion count changes */
  #sugg { display:flex; flex-direction:column; gap:4px; height:284px; overflow:hidden; }
  .sg { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:9px;
    background:rgba(255,255,255,.035); cursor:pointer; font-size:13px; }
  .sg:active { background:rgba(255,255,255,.10); }
  .sg.top { background:rgba(255,211,107,.10); box-shadow:inset 0 0 0 1px rgba(255,211,107,.35); }
  .sg .rk { width:14px; color:#7fb6a6; font-weight:700; text-align:center; font-size:11px; }
  .pip { display:flex; align-items:center; justify-content:center; min-width:18px;
    font-weight:800; font-size:15px; flex:0 0 auto; }
  .pip.red{color:var(--red)} .pip.green{color:var(--green)} .pip.yellow{color:var(--yellow)}
  .pip.blue{color:var(--blue)} .pip.purple{color:var(--purple)}
  .sg .arrow { color:#6fae9e; font-weight:700; }
  .sg .lbl { flex:1; color:#cfe; }
  .sg .q { font-weight:800; color:#e9f7f0; min-width:42px; text-align:right; }
  .sg .bar { width:46px; height:4px; border-radius:2px; background:rgba(255,255,255,.10); overflow:hidden; flex:0 0 auto; }
  .sg .bar > i { display:block; height:100%; background:#5fd0d6; }
  .sg.muted { opacity:.55; font-style:italic; }

  /* "Hide AI features" (menu toggle): drop the whole suggestions panel so the
     board claims the full height/width. #board is flex:1 so it expands for free. */
  body.ai-off #ai { display:none; }

  /* On phones, give the board as much room as possible: shrink the win graph and
     show fewer suggestion rows (the panel clips to its height) so the play area
     stays tall. Keyed on the narrow/short viewport, not desktop. */
  @media (max-width:480px) {
    #ai { padding:2px 10px 0; }
    #ai-head { margin-bottom:3px; }
    #wingraph { height:26px; margin-bottom:4px; }
    #sugg { height:150px; }            /* ~5 rows instead of 8 */
    header { padding:8px 14px 4px; }
  }
  @media (max-height:670px) {
    #wingraph { display:none; }
    #sugg { height:96px; }             /* ~3 rows when vertically cramped */
    header { padding:6px 14px 3px; }
    footer { padding:6px 22px calc(6px + env(safe-area-inset-bottom)) !important; }
  }

  footer { display:flex; justify-content:space-between; align-items:center;
    padding:10px 22px calc(10px + env(safe-area-inset-bottom)); font-size:16px; }
  .act { color:var(--teal); font-weight:700; cursor:pointer; user-select:none; padding:6px 2px; }
  .act:active { opacity:.55; }
  #endturn { font-size:20px; }
  .act.off { opacity:.3; pointer-events:none; }
  #status { color:#8fcfb8; font-size:12px; flex:1; text-align:center; padding:0 8px; }

  #modal { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.55); backdrop-filter:blur(2px); z-index:5; }
  #modal.show { display:flex; }
  .dialog { background:#020b08; border:1px solid #1c5; border-radius:14px; padding:26px 34px;
    text-align:center; min-width:250px; box-shadow:0 0 40px -8px rgba(54,211,154,.5); }
  .dialog h2 { margin:0 0 4px; font-size:25px; color:#fff; }
  .dialog p { margin:0 0 20px; color:#9fc; font-size:14px; }
  .dialog .row { display:flex; gap:34px; justify-content:center; }

  /* clickable W/L record opens the game-history overlay */
  #record { cursor:pointer; text-decoration:underline; text-decoration-color:rgba(143,207,184,.4);
    text-underline-offset:3px; }
  #record:active { opacity:.55; }

  /* game-history overlay: scrollable past games (start board + outcome), tap to reload */
  #histwrap { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.6); backdrop-filter:blur(2px); z-index:6; }
  #histwrap.show { display:flex; }
  #histpanel { background:#020b08; border:1px solid #1c5; border-radius:14px;
    width:min(420px,92vw); max-height:84vh; display:flex; flex-direction:column;
    box-shadow:0 0 40px -8px rgba(54,211,154,.5); overflow:hidden; }
  #hist-head { display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; border-bottom:1px solid rgba(255,255,255,.08);
    font-size:15px; font-weight:700; color:#cfe; letter-spacing:.03em; }
  #hist-list { overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px; }
  #hist-list .muted { color:#7fb6a6; font-style:italic; padding:22px; text-align:center; }
  .hrow { display:flex; align-items:center; gap:12px; padding:8px 10px; border-radius:10px;
    background:rgba(255,255,255,.035); cursor:pointer; }
  .hrow:active { background:rgba(255,255,255,.10); }
  .hrow canvas { width:54px; height:54px; flex:0 0 auto;
    background:rgba(0,0,0,.3); border-radius:8px; }
  .hrow .meta { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
  .hrow .res { font-weight:800; font-size:14px; }
  .hrow .res.won { color:var(--green); } .hrow .res.lost { color:var(--red); }
  .hrow .res.surrendered { color:var(--yellow); } .hrow .res.live { color:var(--teal); }
  .hrow .sub { font-size:11px; color:#7fb6a6; }
  .hrow .when { font-size:11px; color:#5f9e8e; flex:0 0 auto; text-align:right; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="menuwrap">
      <div id="menu" title="Menu"><span></span><span></span><span></span></div>
      <div id="menupop">
        <div class="mi" id="mi-new">New Game</div>
        <div class="mi" id="mi-auto">Autoplay</div>
        <div class="mi" id="mi-ai">AI Assist</div>
        <div class="div"></div>
        <div class="lbl">Animation speed</div>
        <div class="mi sp" data-speed="instant">Instant</div>
        <div class="mi sp" data-speed="fast">Fast</div>
        <div class="mi sp" data-speed="medium">Medium</div>
        <div class="mi sp" data-speed="slow">Slow</div>
      </div>
    </div>
    <div id="chips"></div>
  </header>

  <div id="board"><canvas id="cv"></canvas></div>

  <div id="ai">
    <div id="ai-head"><span id="record" class="off"></span><span id="winpct">—</span></div>
    <canvas id="wingraph"></canvas>
    <div id="sugg"></div>
  </div>

  <footer>
    <div class="act" id="surrender">Surrender</div>
    <div id="status">Select a red node to attack.</div>
    <div class="act" id="endturn">End Turn</div>
  </footer>
</div>

<div id="modal"><div class="dialog">
  <h2 id="m-title">You Won!</h2>
  <p id="m-sub">Play again?</p>
  <div class="row"><div class="act" id="m-no">Close</div><div class="act" id="m-yes">New Game</div></div>
</div></div>

<div id="histwrap"><div id="histpanel">
  <div id="hist-head"><span>Game History</span><div class="act" id="hist-close">Close</div></div>
  <div id="hist-list"></div>
</div></div>

<script>
const COLORS = { red:'#ff4d5e', green:'#36d39a', yellow:'#f5c542', blue:'#4d8bff', purple:'#a96bff' };
const ORDER = ['red','green','yellow','blue','purple'];
const SIMS = 6000;
const SPEEDS = { instant: 0, fast: 0.5, medium: 1, slow: 2 };  // sleep-time multiplier
let animSpeed = 'medium', animMult = 1;
const instant = () => animMult === 0;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

let state = null;          // latest server view
let selected = null;       // selected red node id
let legalSet = new Set();
let targetsFor = new Map(); // from -> Set(to)
let overrides = new Map();  // nodeId -> {strength, owner?} during battle animation
let flashId = null;
let battle = null;          // {from,to} highlighted during a fight
let inputLocked = false;
let animBoard = null;       // mutable node copy used while animating bot turns
let reinforceFlash = null;  // Set(nodeId) briefly highlighted on a reinforce step
let autoplay = false;       // self-play loop: agent plays its top move, no animation
let autoplayRunning = false;
let aiOn = true;            // show the AI win%/graph/suggestions panel (menu toggle)
const record = { w: 0, l: 0 };  // autoplay win/loss tally (this session)

// ---- persistent game history: starting board + outcome of every game played,
// newest first; click a row to reload that exact start (replays the seed). ----
const HIST_KEY = 'nwHistory', HIST_MAX = 60;
let history = [];
try { history = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch (_) { history = []; }
const saveHistory = () => { try { localStorage.setItem(HIST_KEY, JSON.stringify(history)); } catch (_) {} };
let curGameId = null, curEntry = null;   // the history row for the game in progress

// Observe every authoritative board: open a row when a new game id appears, and
// stamp its outcome once it ends. Called from each state-adoption point.
function noteState(s) {
  if (!s || s.id == null) return;
  if (s.id !== curGameId) {                         // a fresh game just began
    curGameId = s.id;
    winSeries = [];                                  // start the win-expectation graph fresh
    curEntry = { seed: s.seed, ts: Date.now(), result: 'live',
      startCounts: { ...s.counts },
      startNodes: s.nodes.map(n => ({ x: n.x, y: n.y, owner: n.owner, strength: n.strength })) };
    history.unshift(curEntry);
    if (history.length > HIST_MAX) history.length = HIST_MAX;
    saveHistory(); updateRecord();
  }
  if (s.over && curEntry && curEntry.result === 'live') {
    curEntry.result = s.youWon ? 'won' : (s.redResigned ? 'surrendered' : 'lost');
    curEntry.finalCounts = { ...s.counts };
    curEntry.turns = s.turn;
    saveHistory(); updateRecord();
  }
}

let suggestions = [];       // ranked top moves from the C-UCT search
let searchId = 0;           // cancels stale searches
let searching = false;
let searchSims = 0;         // live sim count of the in-flight search (streamed)
let winSeries = [];         // converged win-expectation at each decision, this game (line graph)
const pushWin = (w) => { if (w != null) { winSeries.push(w); if (winSeries.length > 300) winSeries.shift(); } };
let hoverMove = null;       // {from,to} of the AI suggestion the cursor is over — previewed on the grid
let lastPointer = { x: -1, y: -1 };  // last seen cursor position, so re-rendered rows can re-sync the hover
// After the suggestion rows are rebuilt, the cursor may sit over a different row
// (or none) without firing mouseenter/leave — re-derive hoverMove from the element
// actually under the cursor so the yellow preview always matches what's hovered.
function syncHoverToCursor() {
  let next = null;
  if (lastPointer.x >= 0) {
    const el = document.elementFromPoint(lastPointer.x, lastPointer.y);
    const row = el && el.closest && el.closest('.sg');
    if (row && row._move) next = row._move;
  }
  const changed = (hoverMove && next && (hoverMove.from !== next.from || hoverMove.to !== next.to))
    || (!hoverMove !== !next);
  hoverMove = next;
  if (changed) draw();
}
document.addEventListener('pointermove', (e) => { lastPointer = { x: e.clientX, y: e.clientY }; });

// A streamed mid-search update: adopt the partial ranking so the panel + board
// show the suggestions and win% converging. Guarded by searchId in onmessage, so
// only the current search paints. The final move is still the converged result.
function onSearchProgress(p) {
  suggestions = p.top || [];
  searchSims = p.sims || 0;
  if (p.winexp != null) state._winexp = p.winexp;
  renderAI();
  draw();
}

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

// The C engine now runs IN THE BROWSER as WASM inside a Web Worker (search never
// blocks the UI). engine.worker.js is a port of solver/server.py — it speaks the
// exact same /api/game/* contract, so the rest of this file is unchanged: api()
// just posts to the worker instead of fetching an HTTP server.
const worker = new Worker('engine.worker.js', { type: 'module' });
const _pending = new Map();
let _msgId = 0;
worker.onmessage = (e) => {
  const d = e.data;
  if (d.type === 'progress') {                 // streaming search update
    if (d.tag === searchId) onSearchProgress(d.result);
    return;
  }
  const { id, result } = d;
  const r = _pending.get(id);
  if (r) { _pending.delete(id); r(result); }
};
function workerCall(path, method, body) {
  return new Promise((resolve) => {
    const id = ++_msgId; _pending.set(id, resolve);
    worker.postMessage({ id, path, method, body });
  });
}

async function api(path, method='GET', body) {
  // Core play (new game / attack / end-turn / search / surrender) + re-homing a
  // loaded board all run in the WASM worker — fully offline, no server needed.
  if (path.startsWith('/api/game') || path.startsWith('/load-board'))
    return workerCall(path, method, body);
  // /load and /grab are the optional iOS workflow: they need solver/server.py
  // running. Best-effort fetch; offline they just fail with a friendly error.
  try {
    const r = await fetch(path, { method, headers:{'Content-Type':'application/json'},
      body: body ? JSON.stringify(body) : undefined });
    return r.json();
  } catch (_) {
    return { error: 'this board source needs solver/server.py running' };
  }
}

function indexMoves() {
  legalSet = new Set(); targetsFor = new Map();
  for (const m of state.legalMoves) {
    legalSet.add(m.from + '-' + m.to);
    if (!targetsFor.has(m.from)) targetsFor.set(m.from, new Set());
    targetsFor.get(m.from).add(m.to);
  }
}

// Adopt a fresh server view and (re)plan with the search.
function setState(s) {
  state = s;
  noteState(s);
  selected = null;
  hoverMove = null;
  indexMoves();
  renderHeader();
  draw();
  if (autoplay) return;          // the autoplay loop owns search + W/L + restart
  if (s.over) { suggestions = []; renderAI(); showModal(); return; }
  requestSearch();
}

function renderHeader() {
  const h = document.getElementById('chips');
  h.innerHTML = '';
  for (const f of ORDER) {
    const c = state.counts[f];
    const d = document.createElement('div');
    d.className = 'chip ' + f + (f==='red' ? ' cur' : '') + (c===0 ? ' dead' : '');
    d.innerHTML = '<b>' + c + '</b>';
    h.appendChild(d);
  }
}

// ---- AI search + suggestions ----
async function requestSearch() {
  if (!state || state.over || inputLocked) return;
  if (!aiOn && !autoplay) return;        // AI features hidden — don't spend a search
  // Always search even with no attacks available — the search returns END TURN as
  // the sole suggestion, so the panel still shows the right move.
  const my = ++searchId;
  searching = true; searchSims = 0; renderAI();
  // tag=my streams mid-search updates (onSearchProgress) so the panel animates as
  // the search converges; the awaited result is the final, threshold-gated answer.
  const res = await api(`/api/game/${state.id}/search`, 'POST', { sims: SIMS, tag: my });
  if (my !== searchId) return;            // a newer position superseded this one
  searching = false;
  suggestions = res.top || [];
  state._winexp = res.winexp;
  pushWin(res.winexp);                     // one graph point per converged decision
  renderAI();
  draw();
}

// ---- autoplay: agent self-plays its top move at full search strength, no animation,
// back-to-back, tallying W/L. A live winrate measurement of our best agent. ----
function updateRecord() {
  const el = document.getElementById('record');
  const w = history.filter(h => h.result === 'won').length;
  const l = history.filter(h => h.result === 'lost' || h.result === 'surrendered').length;
  const n = w + l;
  el.classList.remove('off');     // always visible — it's the clickable history entry point
  el.textContent = n ? `${w}W–${l}L · ${Math.round(100 * w / n)}%` : 'History';
}

function setAutoplay(on) {
  autoplay = on;
  document.getElementById('mi-auto').classList.toggle('sel', on);
  updateRecord();
  if (on) autoplayLoop();        // toggling off is observed by the loop between moves
}

async function autoplayLoop() {
  if (autoplayRunning) return;   // single loop at a time
  autoplayRunning = true;
  inputLocked = true;
  hideModal();
  try {
    while (autoplay) {
      if (!state || state.over) {                 // need a live game to play
        const fresh = await api('/api/game', 'POST', {});
        if (!autoplay) break;
        setState(fresh); resize();                // setState is autoplay-guarded
      }
      while (autoplay && state && !state.over) {   // play one game to terminal
        const my = ++searchId;                     // stream this search to the panel
        searchSims = 0;
        // autoplay streams for the watcher but only commits on the FINAL result —
        // the search's own early-stop is the confidence threshold for the move.
        const s = await api(`/api/game/${state.id}/search`, 'POST', { sims: SIMS, tag: my });
        if (!autoplay) break;
        suggestions = s.top || [];
        state._winexp = s.winexp; pushWin(s.winexp); renderAI(); draw();    // converged view of the agent's pick
        const b = s.best;
        const res = (!b || b.action === -1)
          ? await api(`/api/game/${state.id}/end-turn`, 'POST')
          : await api(`/api/game/${state.id}/attack`, 'POST', { from: b.from, to: b.to });
        if (!autoplay) break;
        state = res; noteState(res); indexMoves(); renderHeader(); draw();
      }
      if (autoplay && state && state.over) {
        if (state.youWon) record.w++; else record.l++;
        updateRecord();
        setStatus(`Autoplay: ${record.w}W–${record.l}L (${state.youWon ? 'won' : 'lost'})`);
        await sleep(300);                          // let the terminal board register
      }
    }
  } finally {
    autoplayRunning = false;
    inputLocked = false;
    updateRecord();
    if (!autoplay && state) {                      // hand control back cleanly
      if (state.over) { suggestions = []; renderAI(); showModal(); }
      else requestSearch();
    }
  }
}

function pip(owner, strength) {
  return `<span class="pip ${owner}">${strength}</span>`;
}

// Wide, short, subtle line graph of win expectation across the game so far.
function drawWinGraph() {
  const cv = document.getElementById('wingraph');
  if (!cv) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = cv.getBoundingClientRect();
  const W = Math.max(1, Math.round(rect.width)), H = Math.max(1, Math.round(rect.height));
  cv.width = W * dpr; cv.height = H * dpr;
  const g = cv.getContext('2d');
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  g.clearRect(0, 0, W, H);
  const padY = 3;
  const yOf = v => padY + (1 - v) * (H - 2*padY);
  // faint 50% reference line
  g.strokeStyle = 'rgba(255,255,255,.10)'; g.lineWidth = 1;
  g.beginPath(); g.moveTo(0, yOf(0.5) + 0.5); g.lineTo(W, yOf(0.5) + 0.5); g.stroke();
  // Anchor every game's curve at a 100% "data point 0" so a fresh graph reads as
  // a line dropping from full strength rather than a lone dot.
  const pts = [1, ...winSeries];
  const n = pts.length;
  const xOf = i => n === 1 ? W/2 : (i/(n-1)) * W;
  // the line itself
  g.beginPath();
  g.moveTo(xOf(0), yOf(pts[0]));
  for (let i = 1; i < n; i++) g.lineTo(xOf(i), yOf(pts[i]));
  g.strokeStyle = 'rgba(95,208,214,.85)'; g.lineWidth = 1.6; g.lineJoin = 'round'; g.stroke();
  // a dot at every datapoint (current value drawn brighter)
  for (let i = 0; i < n; i++) {
    g.fillStyle = i === n - 1 ? '#eafdf6' : '#bfe';
    g.beginPath(); g.arc(xOf(i), yOf(pts[i]), 2, 0, Math.PI*2); g.fill();
  }
}

// one of 8 compass arrows for the on-board direction of an attack (screen y grows downward)
const DIR_ARROWS = ['→','↗','↑','↖','←','↙','↓','↘'];
function dirArrow(f, t) {
  const a = Math.atan2(-(t.y - f.y), t.x - f.x);   // up is positive
  const idx = ((Math.round(a / (Math.PI / 4)) % 8) + 8) % 8;
  return DIR_ARROWS[idx];
}

function renderAI() {
  const wp = document.getElementById('winpct');
  const sg = document.getElementById('sugg');
  drawWinGraph();
  if (searching && !suggestions.length) {
    wp.textContent = 'thinking…';
    sg.innerHTML = '<div class="sg muted">searching…</div>';
    return;
  }
  const w = state && state._winexp != null ? state._winexp : null;
  // while a search streams, append its live sim count so the convergence is visible
  const simTag = searching && searchSims ? ` · ${Math.round(searchSims/1000)}k` : '';
  wp.textContent = w != null ? `${Math.round(w*100)}% win${simTag}` : (searching ? 'thinking…' : '—');
  sg.innerHTML = '';
  if (!suggestions.length) {
    sg.innerHTML = '<div class="sg muted">no suggestions</div>';
    return;
  }
  suggestions.forEach((m, i) => {
    const row = document.createElement('div');
    row.className = 'sg' + (i===0 ? ' top' : '');
    let label;
    if (m.action === -1) {
      label = `<span class="lbl">End turn</span>`;
    } else {
      const f = state.nodes[m.from], t = state.nodes[m.to];
      if (!f || !t) return;          // stale suggestion from a superseded board — skip, never crash
      label = `${pip(f.owner, f.strength)}<span class="arrow">${dirArrow(f, t)}</span>${pip(t.owner, t.strength)}`
            + `<span class="lbl"></span>`;
    }
    row.innerHTML = `<span class="rk">${i+1}</span>${label}`
      + `<span class="bar"><i style="width:${Math.round(m.frac*100)}%"></i></span>`
      + `<span class="q">${Math.round(m.q*100)}%</span>`;
    row.onclick = () => playSuggestion(m);
    if (m.action !== -1) {                  // hovering a real attack previews it on the grid
      row._move = { from: m.from, to: m.to };
      row.onmouseenter = () => { hoverMove = row._move; draw(); };
      row.onmouseleave = () => { hoverMove = null; draw(); };
    }
    sg.appendChild(row);
  });
  syncHoverToCursor();   // rows were rebuilt — match the preview to whatever is now under the cursor
}

async function playSuggestion(m) {
  if (inputLocked || !state || state.over) return;
  hoverMove = null; draw();   // drop the yellow preview the moment the move is taken
  if (m.action === -1) { endTurn(); return; }
  await doAttack(m.from, m.to);
}

// ---- layout ----
let layout = { r: 20, s: 1, ox: 0, oy: 0 };
function resize() {
  const dpr = window.devicePixelRatio || 1;
  drawWinGraph();
  const b = document.getElementById('board').getBoundingClientRect();
  cv.width = b.width * dpr; cv.height = b.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (!state) return;
  const maxX = Math.max(...state.nodes.map(n => n.x)) || 1;
  const maxY = Math.max(...state.nodes.map(n => n.y)) || 1;
  const pad = 38;
  const s = Math.min((b.width - pad*2) / maxX, (b.height - pad*2) / maxY);
  layout = { r: Math.min(s * 0.34, 26), s,
    ox: (b.width - maxX * s) / 2, oy: (b.height - maxY * s) / 2 };
  draw();
}
function nodePos(n) { return { x: layout.ox + n.x * layout.s, y: layout.oy + n.y * layout.s }; }

// directional arrowhead near p2, pointing from p1 -> p2 (tip just outside p2's ring)
function drawArrow(p1, p2, color) {
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const len = Math.hypot(dx, dy) || 1;
  const ux = dx / len, uy = dy / len;          // unit p1->p2
  const px = -uy, py = ux;                      // perpendicular
  const tipX = p2.x - ux * (layout.r + 1), tipY = p2.y - uy * (layout.r + 1);
  const ah = Math.max(5, layout.r * 0.45);     // arrowhead length (small, sits at the target end)
  const aw = Math.max(3.5, layout.r * 0.3);    // arrowhead half-width
  const bx = tipX - ux * ah, by = tipY - uy * ah;
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(bx + px * aw, by + py * aw);
  ctx.lineTo(bx - px * aw, by - py * aw);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.shadowColor = color; ctx.shadowBlur = 10;
  ctx.fill();
  ctx.shadowBlur = 0;
}

// flat-top octagon (stop-sign orientation)
function octagon(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = -Math.PI/2 + Math.PI/8 + Math.PI/8 + i * Math.PI/4;
    const px = x + r * Math.cos(a), py = y + r * Math.sin(a);
    i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
  }
  ctx.closePath();
}

// flat dark fill tinted toward the owner's color (not pure black)
const _darkFill = {};
function darkFill(hex) {
  if (_darkFill[hex]) return _darkFill[hex];
  const s = hex.replace('#', '');
  const r = parseInt(s.slice(0,2),16), g = parseInt(s.slice(2,4),16), b = parseInt(s.slice(4,6),16);
  const t = 0.20; // how much color shows through the dark base
  const mix = (c) => Math.round(2 + c * t);
  return (_darkFill[hex] = `rgb(${mix(r)},${mix(g)},${mix(b)})`);
}

function draw() {
  if (!state) return;
  const b = document.getElementById('board').getBoundingClientRect();
  ctx.clearRect(0, 0, b.width, b.height);
  const nodes = animBoard || state.nodes;
  const pos = nodes.map(nodePos);

  // links
  for (const [a, c] of state.links) {
    const inBattle = battle && ((a===battle.from && c===battle.to) || (a===battle.to && c===battle.from));
    const selHot = selected !== null && (
         (a===selected && targetsFor.get(selected)?.has(c))
      || (c===selected && targetsFor.get(selected)?.has(a)));
    const isHover = hoverMove && ((a===hoverMove.from && c===hoverMove.to) || (a===hoverMove.to && c===hoverMove.from));
    ctx.beginPath();
    ctx.moveTo(pos[a].x, pos[a].y); ctx.lineTo(pos[c].x, pos[c].y);
    // an active fight draws a bright line in the ATTACKER's color (from-node owner)
    if (inBattle) { const ac = COLORS[nodes[battle.from].owner] || COLORS.red;
      ctx.strokeStyle = ac; ctx.lineWidth = 4; ctx.setLineDash([]); ctx.shadowColor = ac; ctx.shadowBlur = 12; }
    else if (selHot) { ctx.strokeStyle = COLORS.red; ctx.lineWidth = 4; ctx.setLineDash([]); ctx.shadowColor = COLORS.red; ctx.shadowBlur = 10; }
    else if (isHover) { ctx.strokeStyle = 'rgba(255,211,107,.9)'; ctx.lineWidth = 3.5; ctx.setLineDash([]); ctx.shadowColor = '#ffd36b'; ctx.shadowBlur = 12; }
    else { ctx.strokeStyle = 'rgba(120,200,160,.28)'; ctx.lineWidth = 1.5; ctx.setLineDash([4,5]); ctx.shadowBlur = 0; }
    ctx.stroke();
  }
  ctx.setLineDash([]); ctx.shadowBlur = 0;

  // nodes
  for (const n of nodes) {
    const p = pos[n.id];
    const ov = overrides.get(n.id);
    const owner = (ov && ov.owner) ? ov.owner : n.owner;
    const strength = ov ? ov.strength : n.strength;
    const col = COLORS[owner];
    const isAtk = battle && n.id === battle.from;
    const isDef = battle && n.id === battle.to;
    const isSel = n.id === selected || isAtk;
    const isTarget = isDef || (selected !== null && targetsFor.get(selected)?.has(n.id));
    const isFlash = n.id === flashId;
    const isRein = reinforceFlash && reinforceFlash.has(n.id);
    // glowing colored ring + glossy gradient fill in the owner's hue (real-game look)
    ctx.save();
    ctx.shadowColor = col;
    ctx.shadowBlur = isFlash ? 30 : (isRein ? 28 : (isSel ? 24 : (isTarget ? 18 : 13)));
    octagon(p.x, p.y, layout.r);
    ctx.fillStyle = darkFill(col);
    ctx.fill();
    ctx.restore();
    octagon(p.x, p.y, layout.r);
    ctx.lineWidth = (isSel || isTarget || isFlash || isRein) ? 3.4 : 2.6;
    ctx.strokeStyle = isFlash ? '#fff' : (isRein ? '#fff' : col);
    ctx.stroke();
    // number (white, with a soft dark shadow so it reads over the bright core)
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.font = `800 ${Math.round(layout.r*0.95)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.55)'; ctx.shadowBlur = 3;
    ctx.fillText(strength, p.x, p.y + 1);
    ctx.restore();
  }

  // hovered suggestion: a directional arrow along the edge (drawn on top of nodes)
  if (hoverMove && hoverMove.from != null && hoverMove.to != null) {
    const pf = pos[hoverMove.from], pt = pos[hoverMove.to];
    if (pf && pt) drawArrow(pf, pt, '#ffd36b');
  }
}

function hitNode(mx, my) {
  for (const n of state.nodes) {
    const p = nodePos(n);
    if (Math.hypot(mx - p.x, my - p.y) <= layout.r) return n;
  }
  return null;
}

// Replay the server's coin-flip sequence before showing the result.
async function animateBattle(e) {
  const { from, to, fromStart, toStart, flips } = e;
  let a = fromStart, d = toStart;
  flashId = null;
  battle = { from, to };
  overrides.set(from, { strength: a });
  overrides.set(to, { strength: d });
  draw();
  await sleep(180 * animMult);
  const delay = Math.max(45, Math.min(150, Math.round(850 / Math.max(flips.length, 1)))) * animMult;
  for (const f of flips) {
    if (f === 'd') { d--; flashId = to; } else { a--; flashId = from; }
    overrides.set(from, { strength: a });
    overrides.set(to, { strength: Math.max(d, 0) });
    draw();
    await sleep(delay);
  }
  flashId = null;
  if (e.captured) {
    overrides.set(to, { strength: e.toStrength, owner: e.attacker });
    overrides.set(from, { strength: e.fromStrength });
    draw();
    await sleep(240 * animMult);
  }
  overrides.clear();
  battle = null;
}

const cap = (s) => s[0].toUpperCase() + s.slice(1);

// One bot battle, compact: highlight from->to in the attacker's color, then commit
// the result with a flash. (Flip-by-flip is reserved for the player's own attacks.)
async function animateBotBattle(e) {
  const from = animBoard[e.from], to = animBoard[e.to];
  battle = { from: e.from, to: e.to };
  overrides.set(e.from, { strength: e.fromStart });
  overrides.set(e.to, { strength: e.toStart });
  draw();
  await sleep(170 * animMult);
  // commit to the working board
  from.strength = e.fromStrength;
  if (e.captured) { to.owner = e.attacker; to.strength = e.toStrength; }
  else { to.strength = e.toStrength; }
  flashId = e.captured ? e.to : e.from;
  overrides.clear();
  draw();
  await sleep(150 * animMult);
  flashId = null;
  battle = null;
}

// Replay RED reinforce + the four bot turns, step by step, from the server's event
// log. Works on a local copy so each move is visible; adopts the authoritative final
// state at the end.
async function animateEndTurn(res) {
  animBoard = state.nodes.map(n => ({ ...n }));
  selected = null; suggestions = []; renderAI();
  let curFaction = null;
  for (const ev of res.events) {
    if (ev.type === 'reinforce') {
      for (const ch of ev.changes) animBoard[ch.id].strength = ch.to;
      reinforceFlash = new Set(ev.changes.map(c => c.id));
      if (ev.faction !== 'red') setStatus(`${cap(ev.faction)} reinforces.`);
      draw();
      await sleep((ev.faction === 'red' ? 160 : 240) * animMult);
      reinforceFlash = null;
      draw();
    } else {
      if (ev.attacker !== curFaction) {
        curFaction = ev.attacker;
        setStatus(`${cap(ev.attacker)} is attacking…`);
      }
      await animateBotBattle(ev);
    }
  }
  animBoard = null;
  reinforceFlash = null;
}

async function doAttack(from, to) {
  selected = null;
  hoverMove = null;
  inputLocked = true;
  setStatus('Attacking…');
  const res = await api(`/api/game/${state.id}/attack`, 'POST', { from, to });
  const e = res.log && res.log[0];
  if (e && e.flips && !instant()) await animateBattle(e);   // state stays pre-attack during replay
  state = res; noteState(res); indexMoves(); renderHeader();
  setStatus(e ? (e.captured ? `Captured node ${e.to}!`
                            : `Attack on ${e.to} repelled (left ${e.fromStrength}).`) : 'Done.');
  // keep attacking from the same node if it can still move
  selected = (!res.over && state.nodes[from].owner === 'red'
    && state.nodes[from].strength > 1 && targetsFor.has(from)) ? from : null;
  inputLocked = false;
  draw();
  if (state.over) { suggestions = []; renderAI(); showModal(); }
  else requestSearch();
}

async function onTap(mx, my) {
  if (!state || state.over || inputLocked) return;
  const n = hitNode(mx, my);
  if (!n) { selected = null; draw(); return; }
  if (selected !== null && targetsFor.get(selected)?.has(n.id)) {
    await doAttack(selected, n.id);
    return;
  }
  if (n.owner === 'red' && n.strength > 1 && targetsFor.has(n.id)) {
    selected = n.id; setStatus('Tap a highlighted enemy node to attack.');
  } else {
    selected = null;
    if (n.owner === 'red') setStatus('That node has no attackable neighbors.');
  }
  draw();
}

function setStatus(t) { document.getElementById('status').textContent = t; }

cv.addEventListener('pointerdown', (ev) => {
  const b = cv.getBoundingClientRect();
  onTap(ev.clientX - b.left, ev.clientY - b.top);
});

async function endTurn() {
  if (!state || state.over || inputLocked) return;
  inputLocked = true;
  selected = null; suggestions = []; renderAI();
  setStatus('Ending turn…');
  const res = await api(`/api/game/${state.id}/end-turn`, 'POST');
  const caps = (res.events||[]).filter(e => e.type==='attack' && e.captured).length;
  if (res.events && res.events.length && !instant()) await animateEndTurn(res);
  inputLocked = false;
  setState(res);                       // adopt authoritative final board + re-search
  if (!res.over) setStatus(`Bots captured ${caps} node(s). Your move.`);
}
document.getElementById('endturn').onclick = endTurn;

document.getElementById('surrender').onclick = async () => {
  if (!state || state.over || inputLocked) return;
  if (!confirm('Surrender this game?')) return;
  const res = await api(`/api/game/${state.id}/surrender`, 'POST');
  setState(res);
};

// hamburger dropdown: New Game + animation speed
const menupop = document.getElementById('menupop');
function updateSpeedMenu() {
  document.querySelectorAll('#menupop .sp').forEach(el =>
    el.classList.toggle('sel', el.dataset.speed === animSpeed));
}
function setSpeed(s) {
  animSpeed = s; animMult = SPEEDS[s];
  try { localStorage.setItem('nwSpeed', s); } catch (_) {}
  updateSpeedMenu();
}
(function loadSpeed() {
  let s; try { s = localStorage.getItem('nwSpeed'); } catch (_) {}
  if (s && s in SPEEDS) { animSpeed = s; animMult = SPEEDS[s]; }
  updateSpeedMenu();
})();
document.getElementById('menu').onclick = () => menupop.classList.toggle('show');
document.getElementById('mi-new').onclick = () => {
  menupop.classList.remove('show');
  if (autoplay) setAutoplay(false);              // a manual new game stops autoplay
  if (inputLocked) return;
  if (state && !state.over && !confirm('Start a new game?')) return;
  newGame();
};
document.getElementById('mi-auto').onclick = () => {
  setAutoplay(!autoplay);                         // leave menu open so the check shows
};
// Hide AI features: drops the whole suggestions panel (board grows to fill) and
// stops spending searches during manual play. Persisted across sessions.
function setAI(on) {
  aiOn = on;
  document.body.classList.toggle('ai-off', !on);
  document.getElementById('mi-ai').classList.toggle('sel', on);
  try { localStorage.setItem('nwAI', on ? '1' : '0'); } catch (_) {}
  resize();                                        // board reclaims/yields the panel's height
  if (on && !autoplay && state && !state.over) requestSearch();
}
(function loadAI() {
  let v; try { v = localStorage.getItem('nwAI'); } catch (_) {}
  setAI(v == null ? true : v === '1');
})();
document.getElementById('mi-ai').onclick = () => setAI(!aiOn);
document.querySelectorAll('#menupop .sp').forEach(el => {
  el.onclick = () => setSpeed(el.dataset.speed);   // leave menu open so the check is visible
});
// Dismiss the menu on any tap outside it. pointerdown (not click) so it closes on
// the first touch — on mobile a trailing synthetic click was unreliable, which made
// the popup feel stuck open.
document.addEventListener('pointerdown', (e) => {
  if (menupop.classList.contains('show') && !document.getElementById('menuwrap').contains(e.target))
    menupop.classList.remove('show');
});

function showModal() {
  const t = document.getElementById('m-title');
  t.textContent = state.youWon ? 'You Won!' : (state.redResigned ? 'You Surrendered' : 'You Lost');
  document.getElementById('m-sub').textContent = state.youWon ? 'Nicely played.' : 'Play again?';
  document.getElementById('modal').classList.add('show');
}
function hideModal() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('m-yes').onclick = () => { hideModal(); newGame(); };
document.getElementById('m-no').onclick = () => { hideModal(); };

// ---- game history overlay ----
const RES_LABEL = { won: 'Won', lost: 'Lost', surrendered: 'Surrendered', live: 'In progress' };
function timeAgo(ts) {
  const s = Math.max(0, Math.round((Date.now() - ts) / 1000));
  if (s < 60) return 'just now';
  const m = Math.round(s / 60); if (m < 60) return m + 'm ago';
  const h = Math.round(m / 60); if (h < 24) return h + 'h ago';
  return Math.round(h / 24) + 'd ago';
}
// Paint a tiny starting-board thumbnail (faction-colored dots laid out by x,y).
function drawThumb(cv, nodes) {
  const ctx = cv.getContext('2d'), W = cv.width, H = cv.height, pad = 5;
  ctx.clearRect(0, 0, W, H);
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const n of nodes) { minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
    minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y); }
  const sx = (W - 2*pad) / Math.max(1, maxX - minX), sy = (H - 2*pad) / Math.max(1, maxY - minY);
  const s = Math.min(sx, sy), r = Math.max(1.4, s * 0.32);
  for (const n of nodes) {
    const x = pad + (n.x - minX) * s, y = pad + (n.y - minY) * s;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = COLORS[n.owner] || '#888'; ctx.fill();
  }
}
function renderHistory() {
  const list = document.getElementById('hist-list');
  list.innerHTML = '';
  if (!history.length) { list.innerHTML = '<div class="muted">No games yet.</div>'; return; }
  history.forEach((h, i) => {
    const row = document.createElement('div');
    row.className = 'hrow';
    const cv = document.createElement('canvas'); cv.width = 54; cv.height = 54;
    const meta = document.createElement('div'); meta.className = 'meta';
    const score = h.result === 'live'
      ? `${h.startCounts ? h.startCounts.red : '?'} nodes at start`
      : `Final: ${h.finalCounts ? h.finalCounts.red : 0} red · ${h.turns || 0} turns`;
    meta.innerHTML = `<span class="res ${h.result}">${RES_LABEL[h.result] || h.result}</span>`
      + `<span class="sub">${score}</span>`;
    const when = document.createElement('div'); when.className = 'when'; when.textContent = timeAgo(h.ts);
    row.appendChild(cv); row.appendChild(meta); row.appendChild(when);
    row.onclick = () => reloadGame(h);
    list.appendChild(row);
    if (h.startNodes) drawThumb(cv, h.startNodes);
  });
}
function openHistory() { renderHistory(); document.getElementById('histwrap').classList.add('show'); }
function hideHistory() { document.getElementById('histwrap').classList.remove('show'); }
document.getElementById('record').onclick = openHistory;
document.getElementById('hist-close').onclick = hideHistory;
document.getElementById('histwrap').onclick = (e) => {
  if (e.target.id === 'histwrap') hideHistory();    // tap the backdrop to dismiss
};

// Replay a past game from its exact starting board (seed regenerates it identically;
// iOS-loaded boards have no seed, so re-home the saved nodes instead).
async function reloadGame(h) {
  hideHistory();
  if (autoplay) setAutoplay(false);
  if (inputLocked) return;
  const res = h.seed != null
    ? await api('/api/game', 'POST', { seed: h.seed })
    : await api('/load-board', 'POST', { nodes: h.startNodes });
  if (res.error) { setStatus('Reload failed: ' + res.error); return; }
  setState(res);
  resize();
  setStatus('Reloaded a past game. Select a red node to attack.');
}

async function newGame() {
  const load = new URLSearchParams(location.search).get('load');
  let res;
  if (load) {
    // Fetch the saved board from the optional server, then re-home it into the WASM
    // worker so the in-browser engine owns the game for every subsequent move.
    const board = await api('/load?file=' + encodeURIComponent(load), 'GET');
    res = board.error ? board : await api('/load-board', 'POST', { nodes: board.nodes });
  } else {
    res = await api('/api/game', 'POST', {});
  }
  if (res.error) { setStatus('Load failed: ' + res.error); return; }
  setState(res);
  resize();
  setStatus(load ? `Loaded board "${load}". Your move.` : 'New game. Select a red node to attack.');
}

window.addEventListener('resize', resize);
// #board is flex:1 above the variable-height AI panel, so its height changes
// whenever suggestions load/clear — re-fit the canvas buffer to avoid a squashed
// (aspect-distorted) board, not just on window resize.
if (window.ResizeObserver) new ResizeObserver(resize).observe(document.getElementById('board'));
newGame();
</script>
</body>
