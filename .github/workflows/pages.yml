# Build the C engine to WASM and deploy the self-contained frontend (public/) to
# GitHub Pages on every push to main. The WASM (public/fast_engine.js) is rebuilt
# from solver/fast_engine.c here, so the deployed engine always matches main's
# source — the committed artifact is just a convenience for local/offline use.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; let an in-progress run finish (don't cancel a live deploy)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
      - name: Build WASM engine from source
        run: bash solver/build_wasm.sh
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - id: deployment
        uses: actions/deploy-pages@v4
