# Deploy the self-contained WASM frontend (public/) to GitHub Pages.
# The site is fully static — fast_engine.js embeds the WASM, and the game runs in a
# Web Worker in the browser, so there is nothing to build here; we just upload public/.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['public/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; let an in-progress run finish (don't cancel a live deploy)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - id: deployment
        uses: actions/deploy-pages@v4
